<div class="Simu-Hud-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Simu-Hud</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="flex-container justify-content-between">
                <label for="simu_hud_enabled">Kích hoạt Simu-Hud</label>
                <input id="simu_hud_enabled" type="checkbox" />
            </div>
            
            <hr />

            <div class="flex-container">
                <input id="simu_hud_test_btn" class="menu_button" type="submit" value="Kiểm tra trạng thái" />
            </div>

            <p><small>Bấm nút trên để xem thông báo popup của SillyTavern.</small></p>
        </div>
    </div>
</div>

<div id="simu-hud-floating-btn" class="simu-hud-floating-btn" title="Simu-Hud Menu">
    <i class="fa-solid fa-gamepad"></i>
</div>

<div id="simu-hud-overlay" class="simu-hud-overlay">
    <div class="simu-hud-modal">
        <div class="simu-hud-modal-header">
            <span class="simu-hud-modal-title">SIMU-HUD</span>
            <button class="simu-hud-close-btn" id="simu-hud-close-btn">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <nav class="simu-hud-nav">
            <button class="simu-hud-tab active" data-tab="context">CONTEXT</button>
            <button class="simu-hud-tab" data-tab="stats">STATS</button>
            <button class="simu-hud-tab" data-tab="inventory">INVENTORY</button>
            <button class="simu-hud-tab" data-tab="goals">GOALS</button>
            <button class="simu-hud-tab" data-tab="assist">ASSIST</button>
        </nav>
        <div class="simu-hud-content">
            <div class="simu-hud-panel active" id="panel-context">
                <div class="stat-row"><span class="stat-label">Time:</span><span class="stat-value">--:-- --</span></div>
                <div class="stat-row"><span class="stat-label">Date:</span><span class="stat-value">--, --/--/----</span></div>
                <div class="stat-row"><span class="stat-label">Location:</span><span class="stat-value">Unknown</span></div>
                <div class="stat-row"><span class="stat-label">Brief:</span><span class="stat-value">No information</span></div>
            </div>
            <div class="simu-hud-panel" id="panel-stats">
                <div class="stat-row"><span class="stat-label">Energy:</span><span class="stat-value">--/--</span></div>
                <div class="stat-row"><span class="stat-label">Nourishment:</span><span class="stat-value">--%</span></div>
                <div class="stat-row"><span class="stat-label">Hydration:</span><span class="stat-value">--%</span></div>
                <div class="stat-row"><span class="stat-label">Hygiene:</span><span class="stat-value">--%</span></div>
                <div class="stat-row"><span class="stat-label">Status:</span><span class="stat-value">Unknown</span></div>
            </div>
            <div class="simu-hud-panel" id="panel-inventory">
                <div class="stat-row"><span class="stat-label">Money:</span><span class="stat-value">0</span></div>
                <div class="stat-row"><span class="stat-label">Carrying:</span><span class="stat-value">Nothing</span></div>
                <div class="stat-row"><span class="stat-label">Nearby Objects:</span><span class="stat-value">None</span></div>
            </div>
            <div class="simu-hud-panel" id="panel-goals">
                <div class="stat-row"><span class="stat-value">None</span></div>
            </div>
            <div class="simu-hud-panel" id="panel-assist">
                <div class="stat-row"><span class="stat-label">Leads:</span></div>
            </div>
        </div>
    </div>
</div>
